<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Data Readiness Assessment - Triangle Information Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --blue:        #0057D4;
      --blue-dark:   #0046AC;
      --blue-mid:    #0063E8;
      --blue-light:  #1A6FE8;
      --blue-card:   #0049B8;
      --blue-card2:  #003D9E;
      --blue-border: #1468D8;
      --blue-border2:#2478E8;
      --white:       #FFFFFF;
      --white-80:    rgba(255,255,255,0.80);
      --white-50:    rgba(255,255,255,0.50);
      --white-25:    rgba(255,255,255,0.25);
      --white-12:    rgba(255,255,255,0.12);
      --white-08:    rgba(255,255,255,0.08);
      --orange:      #F5A623;
      --orange-lite: #FFBE55;
      --teal:        #5CDFD8;
      --amber:       #FFD166;
      --purple:      #C4AAFF;
      --red:         #FF6B6B;
      --green:       #69EFA0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Barlow", sans-serif;
      background: var(--blue);
      min-height: 100vh;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #root { width: 100%; }

    .quiz-shell {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Logo */
    .logo-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
    }
    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
    }

    /* Progress */
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--white-25);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--white);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Section badge */
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .section-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .section-badge.tier1  { color: var(--teal); }
    .section-badge.tier1 .dot  { background: var(--teal); }
    .section-badge.tier2  { color: var(--amber); }
    .section-badge.tier2 .dot  { background: var(--amber); }
    .section-badge.tier3  { color: var(--purple); }
    .section-badge.tier3 .dot  { background: var(--purple); }
    .section-badge.intro  { color: var(--white-80); }
    .section-badge.intro .dot  { background: var(--white-80); }

    /* Question */
    .question-text {
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--white);
      margin-bottom: 8px;
    }
    .question-sub {
      font-size: 14px;
      font-weight: 400;
      color: var(--white-80);
      margin-bottom: 28px;
    }

    /* Options */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-btn {
      width: 100%;
      background: var(--white-08);
      border: 1.5px solid var(--white-25);
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.18s ease;
      color: var(--white-80);
      font-size: 15px;
      font-family: "Barlow", sans-serif;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 14px;
      line-height: 1.4;
    }
    .option-btn:hover {
      background: var(--white-12);
      border-color: var(--white-50);
      color: var(--white);
      transform: translateX(3px);
    }
    .option-btn.selected {
      background: var(--white);
      border-color: var(--white);
      color: var(--blue);
    }
    .option-letter {
      width: 26px; height: 26px;
      min-width: 26px;
      border-radius: 5px;
      background: var(--white-12);
      border: 1px solid var(--white-25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--white-80);
      flex-shrink: 0;
    }
    .option-btn.selected .option-letter {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    /* Nav */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
    }
    .q-counter {
      font-size: 13px;
      color: var(--white-50);
    }
    .btn-primary {
      background: var(--white);
      color: var(--blue);
      border: none;
      border-radius: 6px;
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 700;
      font-family: "Barlow", sans-serif;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn-primary:hover { background: var(--white-80); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      color: var(--white-50);
      border: none;
      padding: 12px 0;
      font-size: 14px;
      font-family: "Barlow", sans-serif;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--white-80); }

    /* Lead screen */
    .welcome-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white-80);
      margin-bottom: 16px;
    }
    .welcome-title {
      font-size: clamp(30px, 6vw, 50px);
      font-weight: 700;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 20px;
    }
    .welcome-title em {
      font-style: italic;
      font-weight: 300;
      color: var(--white);
      opacity: 0.75;
    }
    .welcome-body {
      font-size: 16px;
      font-weight: 400;
      color: var(--white-80);
      line-height: 1.7;
      margin-bottom: 28px;
      max-width: 540px;
    }
    .welcome-meta {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--white-50);
    }
    .divider {
      width: 100%;
      height: 1px;
      background: var(--white-25);
      margin: 24px 0;
    }

    /* Results */
    .results-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .verdict-pill {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .verdict-pill.red    { background: rgba(255,80,80,0.15);   color: #FF8080; border: 1px solid rgba(255,80,80,0.4); }
    .verdict-pill.amber  { background: rgba(255,180,50,0.15);  color: #FFD066; border: 1px solid rgba(255,180,50,0.4); }
    .verdict-pill.yellow { background: rgba(255,220,80,0.15);  color: #FFE566; border: 1px solid rgba(255,220,80,0.4); }
    .verdict-pill.green  { background: rgba(80,220,130,0.15);  color: #60EFA0; border: 1px solid rgba(80,220,130,0.4); }

    .results-title {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .results-subtitle {
      font-size: 15px;
      color: var(--white-80);
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Score ring */
    .score-ring-wrap {
      display: flex;
      justify-content: center;
      margin: 28px 0;
    }
    .score-ring {
      width: 100px;
      height: 100px;
      position: relative;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-num   { font-size: 28px; font-weight: 700; color: var(--white); line-height: 1; }
    .score-denom { font-size: 12px; font-weight: 500; color: var(--white-50); }

    /* Section breakdown */
    .section-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }
    .tier-group { margin-bottom: 6px; }
    .tier-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--white-50);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding-left: 2px;
    }
    .section-row {
      background: var(--white-08);
      border: 1px solid var(--white-25);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .s-icon {
      width: 32px; height: 32px;
      border-radius: 6px;
      background: var(--white-12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .s-info { flex: 1; }
    .s-name { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
    .s-bar-track { height: 4px; background: var(--white-25); border-radius: 2px; overflow: hidden; }
    .s-bar-fill  { height: 100%; border-radius: 2px; transition: width 1s ease 0.3s; }
    .s-verdict {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding: 3px 9px;
      border-radius: 3px;
    }
    .s-verdict.strong      { background: rgba(80,220,130,0.2);  color: #60EFA0; }
    .s-verdict.conditional { background: rgba(255,180,50,0.2);  color: #FFD066; }
    .s-verdict.weak        { background: rgba(255,80,80,0.2);   color: #FF8080; }

    /* CTA box */
    .cta-box {
      background: var(--blue-dark);
      border: 1px solid var(--white-25);
      border-radius: 10px;
      padding: 32px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-box::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--white);
    }
    .cta-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .cta-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }
    .cta-body {
      font-size: 14px;
      color: var(--white-80);
      line-height: 1.65;
      margin-bottom: 22px;
    }
    .cta-body em { font-style: italic; font-weight: 300; }
    .cta-price {
      font-size: 12px;
      color: var(--white-50);
      margin-top: 14px;
      font-weight: 500;
    }
    .cta-contact {
      margin-top: 14px;
      font-size: 12px;
      color: var(--white-50);
      line-height: 1.8;
    }
    .cta-contact a { color: var(--white-50); text-decoration: none; }
    .cta-contact a:hover { color: var(--white); }

    .btn-restart {
      background: transparent;
      border: 1px solid var(--white-25);
      border-radius: 6px;
      padding: 10px 20px;
      color: var(--white-50);
      font-size: 13px;
      font-family: "Barlow", sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 20px;
      display: block;
      width: 100%;
    }
    .btn-restart:hover { color: var(--white-80); border-color: var(--white-50); }

    /* Lead form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-grid .full-width { grid-column: 1 / -1; }
    .field-wrap { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--white-50);
    }
    .field-input {
      background: var(--white-08);
      border: 1.5px solid var(--white-25);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: "Barlow", sans-serif;
      color: var(--white);
      transition: border-color 0.15s;
      outline: none;
      width: 100%;
    }
    .field-input::placeholder { color: var(--white-25); }
    .field-input:focus { border-color: var(--white); }
    .field-input.error { border-color: #FF8080; }
    .field-error { font-size: 11px; color: #FF8080; margin-top: 2px; }
    .form-submit-row { margin-top: 20px; }
    .privacy-note {
      font-size: 11px;
      color: var(--white-25);
      margin-top: 12px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full-width { grid-column: 1; }
    }

    .fade-in {
      animation: fadeSlideIn 0.35s ease forwards;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

          { text: "It gets fixed on an ad-hoc basis, but rarely documented", score: 1 },
          { text: "It is logged, assigned to a clear owner, fixed, and documented", score: 2 },
        ],
      },
      {
        id: "data-age", section: "history", sectionLabel: "History and Structure", tier: 2,
        text: "How long have you been consistently collecting the data you would want AI to work with?",
        options: [
          { text: "Less than 6 months", score: 0 },
          { text: "Between 6 and 12 months", score: 1 },
          { text: "Between 1 and 2 years", score: 1 },
          { text: "More than 2 years", score: 2 },
        ],
      },
      {
        id: "entity-consistency", section: "history", sectionLabel: "History and Structure", tier: 2,
        text: "Is the same customer or supplier stored consistently across all of your systems?",
        options: [
          { text: "No, duplicates are common and the same company often appears multiple times", score: 0 },
          { text: "It is a known issue and there is some duplication we live with", score: 0 },
          { text: "Mostly, it is reasonably clean but not perfect", score: 1 },
          { text: "Yes, we have a single consistent record for each customer", score: 2 },
        ],
      },
      {
        id: "historical-tracking", section: "history", sectionLabel: "History and Structure", tier: 2,
        text: "When a customer updates their information, what happens to the old data?",
        sub: "This helps determine if an AI can analyse past trends accurately.",
        options: [
          { text: "We just overwrite it and the system only shows the current up-to-date state", score: 0 },
          { text: "We might have a backup somewhere but it is not easy to query or report on", score: 0 },
          { text: "We track history for a few key things but mostly just update records", score: 1 },
          { text: "We keep a full timestamped history of changes rather than just overwriting", score: 2 },
        ],
      },
      {
        id: "tribal-knowledge", section: "governance", sectionLabel: "Governance and People", tier: 3,
        text: "If your key data person left tomorrow, what would happen to your data processes?",
        options: [
          { text: "Everything would grind to a halt. All the knowledge is in their head", score: 0 },
          { text: "We would have to reverse-engineer our reports to see how they work", score: 0 },
          { text: "We would struggle for a bit. Some things are documented but a lot is missing", score: 1 },
          { text: "We would manage smoothly. We have up-to-date documentation and cross-trained staff", score: 2 },
        ],
      },
      {
        id: "data-ownership", section: "governance", sectionLabel: "Governance and People", tier: 3,
        text: "Who is officially responsible for the accuracy of your business data?",
        options: [
          { text: "No one specifically. It is everyone's job, which usually means no one's", score: 0 },
          { text: "Just the IT or data team. Business users do not take responsibility for what they enter", score: 0 },
          { text: "Someone informally takes ownership out of necessity, but it is not their defined role", score: 1 },
          { text: "We have formally named data owners with clear documented responsibilities", score: 2 },
        ],
      },
      {
        id: "change-management", section: "governance", sectionLabel: "Governance and People", tier: 3,
        text: "When someone wants to add a new data source or change an existing report, how does that happen?",
        options: [
          { text: "They just do it themselves. There is no formal oversight or testing", score: 0 },
          { text: "They ask verbally, though changes rarely require official testing", score: 1 },
          { text: "Through a formal change request with documented testing and official sign-off", score: 2 },
        ],
      },
      {
        id: "access-control", section: "security", sectionLabel: "Privacy and Security", tier: 2,
        text: "Who can access your customer or sensitive business data right now?",
        options: [
          { text: "It is fairly open. Most staff have access and many have admin rights", score: 0 },
          { text: "It is mostly open by default, though we lock down a few sensitive financial systems", score: 0 },
          { text: "It is restricted, but people ask for access and it is usually granted", score: 1 },
          { text: "Strictly controlled on a least-privilege basis with a formal approval process", score: 2 },
        ],
      },
      {
        id: "dpa", section: "security", sectionLabel: "Privacy and Security", tier: 2,
        text: "If you are using or plan to use a third-party AI tool, have you checked what it does with your data?",
        options: [
          { text: "No, staff might already be pasting company data into public AI tools", score: 0 },
          { text: "We assume enterprise tools are safe but have not verified it", score: 0 },
          { text: "We know we should but have not formalised our vendor agreements yet", score: 1 },
          { text: "Yes, we require strict Data Processing Agreements blocking them from training on our data", score: 2 },
        ],
      },
      {
        id: "pii-masking", section: "security", sectionLabel: "Privacy and Security", tier: 2,
        text: "How do you handle Personally Identifiable Information (PII) before feeding it to an AI model or external tool?",
        options: [
          { text: "We do not filter it. Whatever is in the database gets passed through", score: 0 },
          { text: "We rely on users to manually remove sensitive data before writing their prompts", score: 0 },
          { text: "We try to restrict access to sensitive tables but do not actively mask the data inside them", score: 1 },
          { text: "All sensitive data (PII) is automatically masked, hashed, or stripped before the AI sees it", score: 2 },
        ],
      },
    ];

    const SECTION_META = {
      infrastructure: { icon: "⚙️", label: "Data Infrastructure", color: "#5CDFD8" },
      quality:        { icon: "🔍", label: "Data Quality",          color: "#5CDFD8" },
      history:        { icon: "📊", label: "History and Structure", color: "#FFD166" },
      governance:     { icon: "👥", label: "Governance and People", color: "#C4AAFF" },
      security:       { icon: "🔒", label: "Privacy and Security",  color: "#FFD166" },
    };

    const TIER_GROUPS = [
      { tier: 1, label: "Tier 1 - Blockers",    sections: ["infrastructure", "quality"] },
      { tier: 2, label: "Tier 2 - High Risk",    sections: ["history", "security"] },
      { tier: 3, label: "Tier 3 - Operational",  sections: ["governance"] },
    ];

    function getVerdict(totalScore, tier1Score) {
      if (tier1Score <= 3) return {
        level: "red", label: "Not Ready Yet",
        title: "Your data has fundamental gaps that would stop AI in its tracks.",
        body: "The foundations are not in place yet. Plugging an AI tool into your current data would produce unreliable, potentially misleading results. These are solvable problems and Triangle can help you map out exactly what needs fixing.",
      };
      if (tier1Score <= 5 || totalScore <= 11) return {
        level: "amber", label: "Significant Gaps",
        title: "There is real work to do before AI can deliver on its promise.",
        body: "Your data likely has gaps, inconsistencies, or structural issues that an AI would learn from and reproduce. Getting this right before deployment is always cheaper than fixing it after. Triangle can show you where to start.",
      };
      if (tier1Score <= 7 || totalScore <= 15) return {
        level: "yellow", label: "Getting Closer",
        title: "A solid foundation, although there are risks worth understanding before you commit.",
        body: "You are further along than many businesses we speak to. But there are specific areas where things could go wrong. A full Triangle assessment would tell you exactly where to focus your energy before you invest.",
      };
      return {
        level: "green", label: "Ready for Assessment",
        title: "Strong foundations. Your next step is to confirm what still needs attention.",
        body: "Your data looks like it's in reasonable shape. A full Triangle AI Data Readiness Assessment would map out exactly where you stand across all five dimensions and give you a prioritised roadmap before any deployment begins.",
      };
    }

    function getSectionVerdict(score, max) {
      const pct = score / max;
      if (pct >= 0.75) return { label: "Strong",      cls: "strong" };
      if (pct >= 0.4)  return { label: "Conditional", cls: "conditional" };
      return { label: "At Risk", cls: "weak" };
    }

    function CircleProgress({ score, max, color }) {
      const r = 38, circ = 2 * Math.PI * r;
      const pct = Math.max(0, Math.min(score / max, 1));
      const [animated, setAnimated] = useState(0);
      useEffect(() => { const t = setTimeout(() => setAnimated(pct), 100); return () => clearTimeout(t); }, [pct]);
      return (
        <div className="score-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="6" />
            <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="6"
              strokeDasharray={circ} strokeDashoffset={circ * (1 - animated)} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 1s ease 0.2s" }} />
          </svg>
          <div className="score-text">
            <span className="score-num">{score}</span>
            <span className="score-denom">/ {max}</span>
          </div>
        </div>
      );
    }

    function LeadField({ id, label, placeholder, type, fullWidth, value, error, onChange, onEnter }) {
      return (
        <div className={"field-wrap" + (fullWidth ? " full-width" : "")}>
          <label className="field-label">{label}</label>
          <input type={type || "text"} className={"field-input" + (error ? " error" : "")}
            placeholder={placeholder} value={value}
            onChange={e => onChange(id, e.target.value)}
            onKeyDown={e => e.key === "Enter" && onEnter()} />
          {error && <span className="field-error">{error}</span>}
        </div>
      );
    }

    function WelcomeScreen({ onStart }) {
      return (
        <div className="fade-in">
          <div style={{ marginBottom: 28 }}><Logo size={40} /></div>
          <div className="welcome-eyebrow">AI Data Readiness - Free Diagnostic</div>
          <h1 className="welcome-title">Is your data <em>actually</em> ready for AI?</h1>
          <p className="welcome-body">
            Most businesses assume their data is good enough. Many find out it is not only after they have committed to an AI project. This diagnostic will show you where you stand, before it costs you.
          </p>
          <div className="welcome-meta">
            <span className="meta-item">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.5)" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              5 minutes
            </span>
            <span className="meta-item">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.5)" strokeWidth="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              16 questions
            </span>
            <span className="meta-item">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.5)" strokeWidth="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              Instant results
            </span>
          </div>
          <div className="form-submit-row" style={{ marginTop: 32 }}>
            <button className="btn-primary" onClick={onStart} style={{ padding: "14px 36px", width: "100%" }}>
              Start the assessment
            </button>
          </div>
          <p className="privacy-note" style={{ marginTop: 16 }}>
            Free diagnostic — no sign-up required to begin. Your results are revealed at the end.
          </p>
        </div>
      );
    }

    function EmailCaptureScreen({ onSubmit, onSkip, sessionId, answers }) {
      const [fields, setFields] = React.useState({ firstName: "", lastName: "", company: "", jobTitle: "", email: "" });
      const [errors, setErrors] = React.useState({});
      const set = (k, v) => setFields(f => ({ ...f, [k]: v }));
      const validate = () => {
        const e = {};
        if (!fields.firstName.trim()) e.firstName = "Required";
        if (!fields.lastName.trim())  e.lastName  = "Required";
        if (!fields.company.trim())   e.company   = "Required";
        if (!fields.jobTitle.trim())  e.jobTitle  = "Required";
        if (!fields.email.trim())     e.email     = "Required";
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.email)) e.email = "Enter a valid email";
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      const handleSubmit = async () => {
        if (validate()) {
          try {
            await fetch(`${API_BASE}/log_lead`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_id: sessionId, lead: fields, answers }),
            });
          } catch (e) {
            // Silently fail — don't block the user from seeing their results
          }
          onSubmit(fields);
        }
      };

      return (
        <div className="fade-in">
          <div style={{ marginBottom: 20 }}>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              background: "rgba(92,223,216,0.12)", border: "1px solid rgba(92,223,216,0.3)",
              borderRadius: 6, padding: "6px 14px", marginBottom: 20
            }}>
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#5CDFD8" strokeWidth="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#5CDFD8", letterSpacing: "0.1em", textTransform: "uppercase" }}>Assessment complete</span>
            </div>
            <h2 className="question-text" style={{ marginBottom: 10 }}>Where should we send your results?</h2>
            <p className="question-sub" style={{ marginBottom: 0 }}>
              Enter your details below and we'll show you your full AI data readiness score — including a breakdown across all five dimensions.
            </p>
          </div>
          <div className="divider"></div>
          <div className="form-grid">
            <LeadField id="firstName" label="First name"  placeholder="Jane"                value={fields.firstName} error={errors.firstName} onChange={set} onEnter={handleSubmit} />
            <LeadField id="lastName"  label="Last name"   placeholder="Smith"               value={fields.lastName}  error={errors.lastName}  onChange={set} onEnter={handleSubmit} />
            <LeadField id="company"   label="Company"     placeholder="Acme Ltd"            value={fields.company}   error={errors.company}   onChange={set} onEnter={handleSubmit} />
            <LeadField id="jobTitle"  label="Job title"   placeholder="Operations Director" value={fields.jobTitle}  error={errors.jobTitle}  onChange={set} onEnter={handleSubmit} />
            <LeadField id="email"     label="Work email"  placeholder="jane@acme.com" type="email" fullWidth={true} value={fields.email} error={errors.email} onChange={set} onEnter={handleSubmit} />
          </div>
          <div className="form-submit-row">
            <button className="btn-primary" onClick={handleSubmit} style={{ padding: "14px 36px", width: "100%" }}>
              See my results
            </button>
          </div>
          <p className="privacy-note">
            Your details will only be used by Triangle to follow up on your results. We will not share them with third parties or add you to a mailing list without your permission.
          </p>
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <button onClick={onSkip} style={{
              background: "none", border: "none", color: "rgba(255,255,255,0.3)",
              fontSize: 12, cursor: "pointer", fontFamily: "Barlow, sans-serif",
              textDecoration: "underline", padding: 0
            }}>
              Skip and see results anyway
            </button>
          </div>
        </div>
      );
    }

    function QuestionScreen({ question, qIndex, totalQ, onAnswer, onBack, currentAnswer }) {
      const [selected, setSelected] = useState(currentAnswer !== null && currentAnswer !== undefined ? currentAnswer : null);
      const tierClass = question.section === "intro" ? "intro" : `tier${question.tier}`;
      const letters = ["A", "B", "C", "D"];
      useEffect(() => {
        setSelected(currentAnswer !== null && currentAnswer !== undefined ? currentAnswer : null);
      }, [qIndex]);
      return (
        <div className="fade-in" key={qIndex}>
          <div className={`section-badge ${tierClass}`}>
            <span className="dot"></span>
            {question.sectionLabel}
            {question.tier && <span style={{ opacity: 0.55, fontWeight: 400 }}> - Tier {question.tier}</span>}
          </div>
          <h2 className="question-text">{question.text}</h2>
          {question.sub && <p className="question-sub">{question.sub}</p>}
          <div className="options-list">
            {question.options.map((opt, i) => (
              <button key={i} className={`option-btn ${selected === i ? "selected" : ""}`} onClick={() => setSelected(i)}>
                <span className="option-letter">{letters[i]}</span>
                {opt.text}
              </button>
            ))}
          </div>
          <div className="nav-row">
            <button className="btn-ghost" onClick={onBack}>Back</button>
            <span className="q-counter">{qIndex + 1} / {totalQ}</span>
            <button className="btn-primary" onClick={() => selected !== null && onAnswer(selected)} disabled={selected === null}>
              {qIndex + 1 < totalQ ? "Next" : "See results"}
            </button>
          </div>
        </div>
      );
    }

    function ResultsScreen({ answers, lead, onRestart }) {
      const firstName = lead && lead.firstName ? lead.firstName : null;
      const scoredAnswers = answers.slice(2);
      const scoredQs = QUESTIONS.slice(2);
      const sectionScores = { infrastructure: 0, quality: 0, history: 0, governance: 0, security: 0 };
      const sectionMaxes  = { infrastructure: 0, quality: 0, history: 0, governance: 0, security: 0 };
      scoredQs.forEach((q, i) => {
        const ans = scoredAnswers[i];
        if (ans !== undefined && q.options[ans] && q.options[ans].score !== undefined) {
          sectionScores[q.section] += q.options[ans].score;
        }
        sectionMaxes[q.section] += Math.max(...q.options.map(o => o.score || 0));
      });
      const totalScore = Object.values(sectionScores).reduce((a, b) => a + b, 0);
      const totalMax   = Object.values(sectionMaxes).reduce((a, b) => a + b, 0);
      const tier1Score = sectionScores.infrastructure + sectionScores.quality;
      const verdict    = getVerdict(totalScore, tier1Score);
      const ringColors = { red: "#FF8080", amber: "#FFD066", yellow: "#FFE566", green: "#60EFA0" };

      return (
        <div className="fade-in">
          <div className="results-header">
            <span className={`verdict-pill ${verdict.level}`}>{verdict.label}</span>
            <h2 className="results-title">
              {firstName ? `${firstName}, ` + verdict.title.charAt(0).toLowerCase() + verdict.title.slice(1) : verdict.title}
            </h2>
            <p className="results-subtitle">{verdict.body}</p>
          </div>
          <div className="score-ring-wrap">
            <CircleProgress score={totalScore} max={totalMax} color={ringColors[verdict.level]} />
          </div>
          <div className="section-grid">
            {TIER_GROUPS.map(group => (
              <div className="tier-group" key={group.tier}>
                <div className="tier-label">{group.label}</div>
                {group.sections.map(sec => {
                  const meta = SECTION_META[sec];
                  const score = sectionScores[sec];
                  const max   = sectionMaxes[sec];
                  const sv    = getSectionVerdict(score, max);
                  const pct   = (score / max) * 100;
                  return (
                    <div className="section-row" key={sec}>
                      <div className="s-icon">{meta.icon}</div>
                      <div className="s-info">
                        <div className="s-name">{meta.label}</div>
                        <div className="s-bar-track">
                          <div className="s-bar-fill" style={{ width: `${pct}%`, background: meta.color }} />
                        </div>
                      </div>
                      <span className={`s-verdict ${sv.cls}`}>{sv.label}</span>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
          <div className="cta-box">
            <div className="cta-logo-row"><Logo size={32} /></div>
            <div className="cta-title">Want to know exactly what needs fixing?</div>
            <p className="cta-body">
              This diagnostic gives you a signal. A full AI Data Readiness Assessment from Triangle gives you the complete picture: a detailed verdict across all five dimensions, a prioritised remediation roadmap, and a clear answer to the question: <em>what do we actually need to do before we invest in AI?</em>
            </p>
            <button className="btn-primary" style={{ padding: "14px 32px" }}
              onClick={() => window.open("https://calendly.com/michael-oliver-triangle/30min", "_blank")}>
              Book a call with our team
            </button>
            <p className="cta-price">AI Data Readiness Assessment - From £7,500</p>
            <p className="cta-contact">
              <a href="mailto:hello@triangle.im">hello@triangle.im</a>
              &nbsp;&nbsp;·&nbsp;&nbsp;
              <a href="tel:01256860050">01256 860050</a>
              &nbsp;&nbsp;·&nbsp;&nbsp;
              <a href="https://triangle.im" target="_blank">triangle.im</a>
            </p>
          </div>
          <button className="btn-restart" onClick={onRestart}>Start over</button>
        </div>
      );
    }

    function App() {
      const [screen, setScreen]   = useState("welcome");
      const [qIndex, setQIndex]   = useState(0);
      const [answers, setAnswers] = useState([]);
      const [lead, setLead]       = useState(null);
      const [sessionId]           = useState(generateSessionId);

      // Progress: 0 on welcome, 100 on email/results, proportional during questions
      const progress = screen === "welcome" ? 0
        : screen === "results" || screen === "email" ? 100
        : Math.round((qIndex / QUESTIONS.length) * 100);

      const logProgress = async (currentAnswers, score) => {
        try {
          await fetch(`${API_BASE}/log_progress`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, answers: currentAnswers, score }),
          });
        } catch (e) {
          // Silently fail — don't interrupt the quiz
        }
      };

      const handleStart = () => { setScreen("question"); setQIndex(0); setAnswers([]); };
      const handleAnswer = (optionIndex) => {
        const next = [...answers]; next[qIndex] = optionIndex; setAnswers(next);
        const score = computeCurrentScore(next);
        logProgress(next, score);
        if (qIndex + 1 < QUESTIONS.length) { setQIndex(qIndex + 1); } else { setScreen("email"); }
      };
      const handleBack = () => { if (qIndex === 0) { setScreen("welcome"); } else { setQIndex(qIndex - 1); } };
      const handleLeadSubmit = (fields) => { setLead(fields); setScreen("results"); };
      const handleSkip = () => { setLead(null); setScreen("results"); };
      const handleRestart = () => { setScreen("welcome"); setQIndex(0); setAnswers([]); setLead(null); };

      return (
        <div className="quiz-shell">
          {screen !== "welcome" && (
            <div>
              <div className="logo-bar"><Logo size={28} /></div>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>
          )}
          {screen === "welcome"  && <WelcomeScreen onStart={handleStart} />}
          {screen === "question" && (
            <QuestionScreen key={qIndex} question={QUESTIONS[qIndex]} qIndex={qIndex}
              totalQ={QUESTIONS.length} onAnswer={handleAnswer} onBack={handleBack}
              currentAnswer={answers[qIndex] !== undefined ? answers[qIndex] : null} />
          )}
          {screen === "email"    && <EmailCaptureScreen onSubmit={handleLeadSubmit} onSkip={handleSkip} sessionId={sessionId} answers={answers} />}
          {screen === "results"  && <ResultsScreen answers={answers} lead={lead} onRestart={handleRestart} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
